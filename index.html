<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXO — Discography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;1,9..40,300&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════ HEADER ══════════════ -->
  <header class="header" id="header">
    <div class="header__inner">

      <!-- LEFT: Logo + Brand -->
      <div class="header__left">
        <div class="header__logo">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/EXO_Logo.svg/200px-EXO_Logo.svg.png"
               alt="EXO Logo"
               class="logo-img"
               onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block'" />
          <span id="logo-text" class="logo-text" style="display:none">EXO</span>
        </div>
        <span class="header__brand-sub">OFFICIAL DISCOGRAPHY</span>
      </div>

      <!-- RIGHT: Favorites + Nav toggle -->
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="fav-toggle-btn" id="favToggle" aria-label="Toggle favorites" aria-pressed="false">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
          <span class="fav-toggle-label">FAVORITES</span>
          <span class="fav-count hidden" id="favCount">0</span>
        </button>

        <button class="header__menu-btn" id="menuToggle" aria-label="Toggle menu" aria-expanded="false">
          <span class="burger">
            <span></span>
            <span></span>
            <span></span>
          </span>
          <span class="menu-label">ALBUMS</span>
        </button>
      </div>

    </div>

    <!-- DROPDOWN NAV -->
    <nav class="header__nav" id="headerNav" aria-hidden="true">
      <p class="nav__heading">Browse Albums</p>
      <ul class="nav__list" id="navList">
        <li><span class="nav__loader">Loading albums…</span></li>
      </ul>
    </nav>
  </header>

  <!-- ══════════════ HERO ══════════════ -->
  <section class="hero">
    <div class="hero__bg"></div>
    <div class="hero__content">
      <p class="hero__eyebrow">K-POP · SINCE 2012</p>
      <h1 class="hero__title">
        <span class="hero__title-line">WE ARE</span>
        <span class="hero__title-line accent">ONE</span>
      </h1>
      <p class="hero__sub">Explore every album, click any track to preview.</p>
    </div>
    <div class="hero__scroll-hint">
      <span>SCROLL</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- ══════════════ MAIN CONTENT ══════════════ -->
  <main class="main" id="main">

    <!-- Loading State -->
    <div class="loading-state" id="loadingState">
      <div class="loading-orb"></div>
      <p>Fetching EXO discography…</p>
    </div>

    <!-- Error State -->
    <div class="error-state hidden" id="errorState">
      <p>⚠️ Could not load albums. Check your connection and refresh.</p>
      <button class="btn-retry" onclick="initApp()">Retry</button>
    </div>

    <!-- Albums Grid -->
    <div class="albums-container hidden" id="albumsContainer"></div>

    <!-- Favorites View -->
    <div class="fav-view hidden" id="favView"></div>

  </main>

  <!-- ══════════════ NOW PLAYING BAR ══════════════ -->
  <div class="player-bar hidden" id="playerBar">
    <div class="player-bar__art" id="playerArt"></div>
    <div class="player-bar__info">
      <p class="player-bar__track" id="playerTrack">—</p>
      <p class="player-bar__album" id="playerAlbum">—</p>
    </div>
    <div class="player-bar__controls">
      <button class="player-btn" id="playerPlayPause" aria-label="Play/Pause">
        <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" class="hidden"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="player-btn" id="playerClose" aria-label="Close player">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="player-bar__progress">
      <div class="player-bar__progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- AUDIO ELEMENT -->
  <audio id="audioPlayer" preload="none"></audio>

  <script src="app.js"></script>
</body>
</html>
